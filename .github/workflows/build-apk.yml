name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --legacy-peer-deps --registry https://registry.npmjs.org

      - name: Build APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Collect APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          cp "$APK" agenceprospect.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: AgenceProspect v1.0.${{ github.run_number }}
          body: |
            ## AgenceProspect Android APK
            Application de prospection immobiliere Mubawab.ma

            ### Installation
            1. Telecharger le fichier `.apk` ci-dessous
            2. Activer Sources inconnues dans les parametres Android
            3. Ouvrir le fichier pour installer
          files: agenceprospect.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
